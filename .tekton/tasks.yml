apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lint
spec:
  steps:
    - name: flake8
      image: python:3.9-slim
      script: |
        pip install flake8
        flake8 service --count --select=E9,F63,F7,F82 --show-source --statistics

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  steps:
    - name: run-tests
      image: python:3.9-slim
      script: |
        pip install -r requirements.txt
        nosetests

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        echo "Cleaning up..."
