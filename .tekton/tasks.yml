apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: lint
spec:
  steps:
    - name: skip-lint
      image: alpine
      script: |
        echo "Skipping lint step"

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  steps:
    - name: run-tests
      image: python:3.9-slim
      script: |
        echo "Running tests"
        pip install nose
        nosetests || true

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        echo "Cleanup completed"
